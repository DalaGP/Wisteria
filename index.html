<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Wisteria</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-int:#2a1a0a;--bg-ext:#1a1a2e;
  --surface2-int:#4a2e14;--surface2-ext:#0f3460;
  --surface-int:#3d2510;--surface-ext:#16213e;
  --border-int:#6b3d1a;--border-ext:#2a2a4a;
  --border2-int:#8b5a2a;--border2-ext:#3a3a6a;
  --cell-int:#3a2208;--cell-ext:#12122a;--cell-roof:#1a2e0a;
  --text:#e8e8f0;--text2:#9999bb;--text3:#5555aa;
  --accent:#7f77dd;--accent2:#534ab7;
  --green:#1d9e75;--green2:#0f6e56;
  --radius:8px;--cell:54px;--gap:3px;
}
body{background:var(--bg-ext);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;transition:background 0.3s}
body.int-mode{background:var(--bg-int)}
header{padding:10px 20px;border-bottom:1px solid var(--border-ext);display:flex;align-items:center;justify-content:space-between;background:var(--bg-ext);gap:12px;flex-wrap:wrap}
.header-left{display:flex;align-items:center;gap:12px}
.header-img{height:50px;border-radius:6px;opacity:0.92;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.6))}
.header-titles h1{font-size:18px;font-weight:600;color:var(--accent)}
.header-titles .subtitle{font-size:11px;color:var(--text2);margin-top:1px}
.header-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.sync-status{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:5px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.sync-dot.syncing{background:#ef9f27;animation:pulse 1s infinite}
.sync-dot.error{background:#e24b4a}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.hbtn{padding:4px 10px;font-size:11px;border:1px solid var(--border2-ext);border-radius:var(--radius);cursor:pointer;background:transparent;color:var(--text2);white-space:nowrap}
.hbtn:hover{color:var(--text);border-color:var(--text2)}
.hbtn:disabled{opacity:0.3;cursor:default}
.hbtn.danger{border-color:#a32d2d;color:#e24b4a}
.hbtn.danger:hover{background:#a32d2d22}
.tabs{display:flex;gap:6px;padding:12px 20px 0;background:var(--bg-ext)}
.tab{padding:6px 16px;border:1px solid var(--border2-ext);border-bottom:none;border-radius:var(--radius) var(--radius) 0 0;cursor:pointer;font-size:12px;color:var(--text2);background:var(--surface-ext)}
.tab.active.int{background:var(--surface2-int);color:var(--accent);border-color:var(--border2-int)}
.tab.active.ext{background:var(--surface2-ext);color:var(--accent);border-color:var(--accent2)}
.tab.active.notes{background:#1a2a1a;color:#1d9e75;border-color:#2d5016}
.layout{display:grid;grid-template-columns:1fr 270px;height:calc(100vh - 102px)}
.grid-area{padding:16px 20px;overflow:auto;transition:background 0.3s}
.grid-area.int{background:var(--surface2-int)}
.grid-area.ext{background:var(--surface2-ext)}
.grid-area.notes-area{background:#0d1a0d;padding:0}
.grid-title{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;opacity:0.7}
.grid{display:inline-grid;gap:var(--gap);position:relative;user-select:none}
.cell{width:var(--cell);height:var(--cell);border-radius:4px;transition:background 0.1s,border-color 0.1s}
.cell.int-cell{background:var(--cell-int);border:1px solid var(--border-int)}
.cell.ext-cell{background:var(--cell-ext);border:1px solid var(--border-ext)}
.cell.roof-cell{background:var(--cell-roof);border:1px solid #2d4a1a}
.cell.hl{background:#1d9e7533!important;border-color:var(--green)!important}
.cell.bl{background:#e24b4a22!important;border-color:#e24b4a77!important}
.roof-frame{position:absolute;pointer-events:none;border:2px dashed #3d6b1a99;border-radius:6px;z-index:1}
.roof-label{position:absolute;font-size:9px;color:#3d6b1aaa;text-transform:uppercase;letter-spacing:1px;pointer-events:none;z-index:2}
.m-icon{font-size:20px;line-height:1}
.m-name{font-size:9px;font-weight:600;text-align:center;line-height:1.2;padding:0 3px;text-shadow:0 1px 2px rgba(0,0,0,0.6)}
.sidebar{display:flex;flex-direction:column;overflow:hidden;border-left:1px solid var(--border2-ext);border-top:1px solid var(--border2-ext)}
.sidebar.int{background:var(--surface-int)}
.sidebar.ext{background:var(--surface-ext)}
.sb-section{padding:12px;border-bottom:1px solid var(--border-ext)}
.sb-section.int-s{border-bottom-color:var(--border-int)}
.sb-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sb-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px}
.edit-btn{padding:3px 8px;font-size:10px;border:1px solid var(--border2-ext);border-radius:var(--radius);cursor:pointer;background:transparent;color:var(--text2)}
.edit-btn:hover{color:var(--accent)}
.palette{display:flex;flex-direction:column;gap:4px;max-height:240px;overflow-y:auto}
.palette::-webkit-scrollbar{width:4px}
.palette::-webkit-scrollbar-thumb{background:var(--border2-ext);border-radius:2px}
.pitem{display:flex;align-items:center;gap:8px;padding:5px 8px;border:1px solid var(--border-ext);border-radius:var(--radius);cursor:grab}
.pitem.int-p{background:var(--cell-int);border-color:var(--border-int)}
.pitem.ext-p{background:#12122a}
.pitem.placed{opacity:0.4;cursor:default}
.pitem.locked-pal{border-color:#ef9f2788;background-image:repeating-linear-gradient(45deg,transparent,transparent 4px,#ef9f2708 4px,#ef9f2708 8px)}
.p-icon{width:28px;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.p-info{flex:1;min-width:0}
.p-name{font-size:11px;font-weight:500;color:var(--text)}
.p-size{font-size:10px;color:var(--text2)}
.p-btns{display:flex;gap:3px}
.rot-btn,.mod-btn{width:20px;height:20px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border2-ext);border-radius:4px;cursor:pointer;background:transparent;color:var(--text2);font-size:11px;flex-shrink:0}
.rot-btn:hover{color:var(--accent)}
.mod-btn:hover{color:#ef9f27}
.panel{flex:1;padding:12px;overflow-y:auto}
.panel-empty{font-size:12px;color:var(--text3);font-style:italic;margin-top:4px}
.panel h3{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px}
.panel-desc{font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:8px}
.panel textarea{width:100%;min-height:70px;border-radius:var(--radius);padding:7px;color:var(--text);font-size:11px;font-family:inherit;resize:vertical}
.panel textarea.int-ta{background:var(--cell-int);border:1px solid var(--border-int)}
.panel textarea.ext-ta{background:#12122a;border:1px solid var(--border2-ext)}
.panel textarea:focus{outline:none;border-color:var(--accent2)}
.btn-row{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.btn{padding:4px 10px;font-size:11px;border-radius:var(--radius);cursor:pointer;border:1px solid}
.btn-save{background:var(--green2);border-color:var(--green);color:#fff}
.btn-rot{background:transparent;border-color:var(--accent2);color:var(--accent)}
.btn-lock{background:transparent;border-color:#ef9f27;color:#ef9f27}
.btn-del{background:transparent;border-color:#a32d2d;color:#e24b4a}
.btn-del:hover{background:#a32d2d22}
.save-ok{font-size:10px;color:var(--green);margin-top:4px;min-height:13px}
.notes-layout{display:grid;grid-template-columns:180px 1fr;height:100%}
.notes-list{border-right:1px solid #2d5016;padding:10px;display:flex;flex-direction:column;gap:5px;overflow-y:auto;background:#0d1a0d}
.notes-list h3{font-size:11px;color:#1d9e75;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.note-item{padding:6px 8px;border:1px solid #2d5016;border-radius:var(--radius);cursor:pointer;font-size:12px;color:var(--text2);background:#0f2210;display:flex;align-items:center;justify-content:space-between;gap:4px}
.note-item:hover{border-color:#1d9e75;color:var(--text)}
.note-item.active{background:#1d9e7522;border-color:#1d9e75;color:var(--text)}
.note-del{font-size:11px;color:#a32d2d;cursor:pointer;padding:0 2px}
.note-del:hover{color:#e24b4a}
.add-note-btn{padding:5px 8px;border:1px dashed #2d5016;border-radius:var(--radius);cursor:pointer;font-size:11px;color:#1d9e75;background:transparent;text-align:center;margin-top:4px}
.add-note-btn:hover{background:#1d9e7522}
.note-editor{padding:12px;display:flex;flex-direction:column;gap:8px;background:#0d1a0d}
.note-title-input{background:#0f2210;border:1px solid #2d5016;border-radius:var(--radius);padding:6px 10px;color:var(--text);font-size:13px;font-weight:500;width:100%}
.note-title-input:focus{outline:none;border-color:#1d9e75}
.note-content{background:#0f2210;border:1px solid #2d5016;border-radius:var(--radius);padding:10px;color:var(--text);font-size:12px;font-family:inherit;resize:none;min-height:300px;flex:1}
.note-content:focus{outline:none;border-color:#1d9e75}
.note-save-btn{padding:6px 14px;background:var(--green2);border:none;border-radius:var(--radius);color:#fff;font-size:11px;cursor:pointer;align-self:flex-start}
.note-empty{font-size:12px;color:#2d5016;font-style:italic;text-align:center;padding:40px 20px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:#1e1e3a;border:1px solid var(--border2-ext);border-radius:12px;padding:18px;width:360px;max-height:85vh;overflow-y:auto}
.modal h2{font-size:14px;font-weight:600;color:var(--accent);margin-bottom:12px}
.form-row{margin-bottom:9px}
.form-row label{display:block;font-size:10px;color:var(--text2);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.5px}
.form-row input,.form-row select,.form-row textarea{width:100%;background:#12122a;border:1px solid var(--border2-ext);border-radius:var(--radius);padding:6px 8px;color:var(--text);font-size:12px;font-family:inherit}
.emoji-cats{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.emoji-cat-btn{padding:2px 6px;font-size:10px;border:1px solid var(--border2-ext);border-radius:4px;cursor:pointer;background:transparent;color:var(--text2)}
.emoji-cat-btn.active{background:var(--accent2);color:#fff}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:3px;max-height:100px;overflow-y:auto;background:#12122a;border:1px solid var(--border2-ext);border-radius:var(--radius);padding:5px}
.emoji-pick{font-size:17px;cursor:pointer;text-align:center;padding:2px;border-radius:3px}
.emoji-pick:hover,.emoji-pick.sel{background:var(--border2-ext)}
.shape-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-top:4px}
.shape-cell{width:100%;aspect-ratio:1;border:1px solid var(--border2-ext);border-radius:3px;cursor:pointer;background:#12122a}
.shape-cell.active{background:var(--accent);border-color:var(--accent)}
.modal-btns{display:flex;gap:8px;margin-top:12px}
.btn-primary{flex:1;padding:6px;background:var(--accent2);border:none;border-radius:var(--radius);color:#fff;font-size:12px;cursor:pointer}
.btn-primary:hover{background:var(--accent)}
.btn-secondary{flex:1;padding:6px;background:transparent;border:1px solid var(--border2-ext);border-radius:var(--radius);color:var(--text2);font-size:12px;cursor:pointer}
.btn-danger-sm{padding:4px 10px;background:transparent;border:1px solid #a32d2d;border-radius:var(--radius);color:#e24b4a;font-size:11px;cursor:pointer;margin-top:8px}
.confirm-bg{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;display:flex;align-items:center;justify-content:center}
.confirm-box{background:#1e1e3a;border:1px solid #a32d2d;border-radius:10px;padding:20px;width:280px;text-align:center}
.confirm-box p{font-size:13px;color:var(--text);margin-bottom:14px}
.confirm-btns{display:flex;gap:8px}
</style>
</head>

<div class="tabs">
  <button class="tab" id="tab-int" onclick="switchView('interior')">Interieur</button>
  <button class="tab active ext" id="tab-ext" onclick="switchView('exterior')">Exterieur</button>
  <button class="tab" id="tab-notes" onclick="switchView('notes')">Notes</button>
</div>
<div class="layout">
  <div class="grid-area ext" id="grid-area">
    <div class="grid-title" id="grid-title">Exterieur 11x7</div>
    <div class="grid" id="grid"></div>
  </div>

let view='exterior';
let S={
  interior:{p:{},n:{},r:{},l:{},c:[]},
  exterior:{p:{},n:{},r:{},l:{},c:[]}
};
let sharedNotes={};
let hist={interior:[],exterior:[]};
let sel=null,drag=null,timers={},editId=null,selEmoji='📦',curNoteId=null;
let shapeSelected=new Set();

function getMods(v){return[...DM[v],...S[v].c];}

function setSS(s){
  document.getElementById('sync-dot').className='sync-dot'+(s==='s'?' syncing':s==='e'?' error':'');
  document.getElementById('sync-label').textContent=s==='ok'?'Synchronise':s==='s'?'Enregistrement':s==='e'?'Erreur':'Connexion';
}

['interior','exterior'].forEach(v=>{
  const r=fbRefs[v];
  onValue(r.p,sn=>{S[v].p=sn.val()||{};if(view===v)render();});
  onValue(r.n,sn=>{S[v].n=sn.val()||{};if(view===v&&sel)renderPanel(sel);});
  onValue(r.r,sn=>{S[v].r=sn.val()||{};if(view===v)render();});
  onValue(r.l,sn=>{S[v].l=sn.val()||{};if(view===v)render();});
  onValue(r.c,sn=>{const d=sn.val();S[v].c=d?Object.values(d):[];if(view===v)render();});
});
onValue(fbRefs.notes,sn=>{sharedNotes=sn.val()||{};if(view==='notes')renderNotes();});
setSS('ok');

function pushH(v){
  const s=JSON.stringify({p:S[v].p,r:S[v].r,l:S[v].l});
  hist[v].push(s);if(hist[v].length>MAX_HIST)hist[v].shift();
  const b=document.getElementById('undo-btn');if(b)b.disabled=hist[view].length===0;
}
function updUndo(){const b=document.getElementById('undo-btn');if(b)b.disabled=(hist[view]||[]).length===0;}

window.undo=function(){
  if(!hist[view]||hist[view].length===0)return;
  const prev=JSON.parse(hist[view].pop());
  S[view].p=prev.p||{};S[view].r=prev.r||{};S[view].l=prev.l||{};
  save(view);render();renderPanel(null);updUndo();
};
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();window.undo();}});

function save(v){
  clearTimeout(timers[v]);
  timers[v]=setTimeout(()=>{
    setSS('s');
    const co={};S[v].c.forEach(m=>co[m.id]=m);
    Promise.all([
      set(fbRefs[v].p,S[v].p||{}),
      set(fbRefs[v].n,S[v].n||{}),
      set(fbRefs[v].r,S[v].r||{}),
      set(fbRefs[v].l,S[v].l||{}),
      set(fbRefs[v].c,co),
    ]).then(()=>setSS('ok')).catch(()=>setSS('e'));
  },800);
}
function saveNotes(){
  clearTimeout(timers.notes);
  timers.notes=setTimeout(()=>{
    setSS('s');
    set(fbRefs.notes,sharedNotes||{}).then(()=>setSS('ok')).catch(()=>setSS('e'));
  },800);
}

function cells(mod,rot){
  let c=mod.cells.map(x=>[...x]);
  const r=(rot||0)%4;
  for(let i=0;i<r;i++){c=c.map(([x,y])=>[-y,x]);const mx=Math.min(...c.map(v=>v[0])),my=Math.min(...c.map(v=>v[1]));c=c.map(([x,y])=>[x-mx,y-my]);}
  return c;
}
function isRoof(r,c){return view==='exterior'&&r>=ROOF.row&&r<ROOF.row+ROOF.rows&&c>=ROOF.col&&c<ROOF.col+ROOF.cols;}
function canPlace(id,r,c,rot){
  const{cols,rows}=GRIDS[view];
  const mod=getMods(view).find(m=>m.id===id);if(!mod)return false;
  const cs=cells(mod,rot);
  for(const[dc,dr]of cs){
    const nr=r+dr,nc=c+dc;
    if(nr<0||nr>=rows||nc<0||nc>=cols)return false;
    for(const[pid,pos]of Object.entries(S[view].p)){
      if(pid===id||!pos)continue;
      const om=getMods(view).find(m=>m.id===pid);if(!om)continue;
      const oc=cells(om,S[view].r[pid]||0);
      for(const[odc,odr]of oc){if(pos.r+odr===nr&&pos.c+odc===nc)return false;}
    }
  }
  return true;
}

window.switchView=function(v){
  view=v;sel=null;
  const isI=v==='interior',isE=v==='exterior',isN=v==='notes';
  document.body.className=isI?'int-mode':'';
  document.getElementById('tab-int').className='tab'+(isI?' active int':'');
  document.getElementById('tab-ext').className='tab'+(isE?' active ext':'');
  document.getElementById('tab-notes').className='tab'+(isN?' active notes':'');
  const ga=document.getElementById('grid-area');
  const sb=document.getElementById('sidebar');
  if(isN){
    ga.className='grid-area notes-area';
    sb.style.display='none';
    ga.innerHTML='<div class="notes-layout"><div class="notes-list" id="notes-list"></div><div class="note-editor" id="note-editor"><div class="note-empty">Selectionnez ou creez une note.</div></div></div>';
    renderNotes();
  } else {
    sb.style.display='';
    ga.className='grid-area '+(isI?'int':'ext');
    sb.className='sidebar '+(isI?'int':'ext');
    document.getElementById('sb-top-sec').className='sb-section '+(isI?'int-s':'');
    const{cols,rows}=GRIDS[v];
    // Reconstruire le contenu de la grille proprement
    ga.innerHTML=`<div class="grid-title" id="grid-title">${isI?'Interieur 9x5':'Exterieur 11x7'}</div><div class="grid" id="grid"></div>`;
    document.getElementById('f-view').value=v;
    // Attendre que le DOM soit prêt avant de rendre
    requestAnimationFrame(()=>{render();renderPanel(null);});
  }
  updUndo();
};

function render(){
  const{cols,rows}=GRIDS[view];const isI=view==='interior';
  const grid=document.getElementById('grid');if(!grid)return;
  grid.style.gridTemplateColumns=`repeat(${cols},${CELL}px)`;
  grid.style.width=`${cols*(CELL+GAP)-GAP}px`;
  grid.style.height=`${rows*(CELL+GAP)-GAP}px`;
  grid.innerHTML='';
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const el=document.createElement('div');
    const rf=isRoof(r,c);
    el.className='cell '+(isI?'int-cell':rf?'roof-cell':'ext-cell');
    el.dataset.r=r;el.dataset.c=c;
    el.addEventListener('dragover',onOver);el.addEventListener('drop',onDrop);el.addEventListener('dragleave',clearHL);
    grid.appendChild(el);
  }
  if(!isI){
    const fr=document.createElement('div');fr.className='roof-frame';
    fr.style.cssText=`left:${ROOF.col*(CELL+GAP)}px;top:${ROOF.row*(CELL+GAP)}px;width:${ROOF.cols*(CELL+GAP)-GAP}px;height:${ROOF.rows*(CELL+GAP)-GAP}px`;
    grid.appendChild(fr);
    const lb=document.createElement('div');lb.className='roof-label';lb.textContent='Toit';
    lb.style.cssText=`left:${ROOF.col*(CELL+GAP)+8}px;top:${ROOF.row*(CELL+GAP)+5}px`;
    grid.appendChild(lb);
  }
  Object.entries(S[view].p).forEach(([pid,pos])=>{
    if(!pos)return;
    const mod=getMods(view).find(m=>m.id===pid);if(!mod)return;
    const rot=S[view].r[pid]||0,locked=S[view].l[pid];
    const cs=cells(mod,rot);
    cs.forEach(([dc,dr],ci)=>{
      const idx=(pos.r+dr)*cols+(pos.c+dc);
      const ce=grid.children[idx];if(!ce||!ce.classList.contains('cell'))return;
      ce.style.background=mod.color+'28';
      ce.style.borderColor=mod.color+(pid===sel?'cc':'55');
      if(pid===sel)ce.style.boxShadow='inset 0 0 0 2px '+mod.color;
      if(!locked){ce.style.cursor='grab';ce.draggable=true;ce.addEventListener('dragstart',e=>{drag={id:pid};e.dataTransfer.effectAllowed='move';},{once:true});}
      ce.addEventListener('click',e=>{e.stopPropagation();sel=pid;render();renderPanel(pid);},{once:true});
      if(ci===0){
        const lb=document.createElement('div');
        lb.style.cssText=`position:absolute;left:${pos.c*(CELL+GAP)}px;top:${pos.r*(CELL+GAP)}px;width:${CELL}px;height:${CELL}px;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:4`;
        lb.innerHTML=`<div class="m-icon">${mod.icon}${locked?'<span style="font-size:8px;position:absolute;top:2px;right:2px">🔒</span>':''}</div><div class="m-name" style="color:${mod.color}">${mod.name}</div>`;
        grid.appendChild(lb);
      }
    });
  });
  grid.addEventListener('click',()=>{sel=null;render();renderPanel(null);});
  renderPalette();
}

function renderPalette(){
  const pal=document.getElementById('palette');if(!pal)return;
  pal.innerHTML='';const isI=view==='interior';
  getMods(view).forEach(mod=>{
    const placed=!!(S[view].p[mod.id]&&S[view].p[mod.id].r!==undefined);
    const item=document.createElement('div');
    const isLocked=!!(S[view].l&&S[view].l[mod.id]);
    item.className='pitem '+(placed?'placed':'')+(isI?' int-p':' ext-p')+(isLocked?' locked-pal':'');
    item.draggable=!placed;
    if(!placed)item.addEventListener('dragstart',e=>{drag={id:mod.id};e.dataTransfer.effectAllowed='move';});
    const rot=S[view].r[mod.id]||0,cs=cells(mod,rot);
    const w=Math.max(...cs.map(c=>c[0]))+1,h=Math.max(...cs.map(c=>c[1]))+1;
    item.innerHTML=`<div class="p-icon" style="background:${mod.color}28">${mod.icon}</div><div class="p-info"><div class="p-name">${mod.name}${placed?' ✓':''}</div><div class="p-size">${w}x${h} · ${cs.length} case${cs.length>1?'s':''}</div></div><div class="p-btns"><div class="rot-btn">↻</div><div class="mod-btn">✎</div></div>`;
    item.querySelector('.rot-btn').addEventListener('click',e=>{e.stopPropagation();S[view].r[mod.id]=((S[view].r[mod.id]||0)+1)%4;save(view);render();});
    item.querySelector('.mod-btn').addEventListener('click',e=>{e.stopPropagation();openEditModal(mod.id);});
    pal.appendChild(item);
  });
}

function onOver(e){
  e.preventDefault();if(!drag)return;clearHL();
  const r=+e.currentTarget.dataset.r,c=+e.currentTarget.dataset.c;
  const{cols,rows}=GRIDS[view];
  const mod=getMods(view).find(m=>m.id===drag.id);if(!mod)return;
  const rot=S[view].r[drag.id]||0,cs=cells(mod,rot),ok=canPlace(drag.id,r,c,rot);
  const grid=document.getElementById('grid');
  cs.forEach(([dc,dr])=>{const nr=r+dr,nc=c+dc;if(nr>=0&&nr<rows&&nc>=0&&nc<cols){const el=grid.children[nr*cols+nc];if(el&&el.classList.contains('cell'))el.classList.add(ok?'hl':'bl');}});
}

function onDrop(e){
  e.preventDefault();clearHL();if(!drag)return;
  if(S[view].l[drag.id]){drag=null;return;}
  const r=+e.currentTarget.dataset.r,c=+e.currentTarget.dataset.c;
  const rot=S[view].r[drag.id]||0;
  if(canPlace(drag.id,r,c,rot)){pushH(view);S[view].p[drag.id]={r,c};save(view);render();if(drag.id===sel)renderPanel(drag.id);}
  drag=null;
}
function clearHL(){document.querySelectorAll('.cell.hl,.cell.bl').forEach(el=>el.classList.remove('hl','bl'));}

function renderPanel(id){
  const panel=document.getElementById('panel');if(!panel)return;
  const isI=view==='interior';
  if(!id){panel.innerHTML='<div class="panel-empty">Cliquez sur un module place.</div>';return;}
  const mod=getMods(view).find(m=>m.id===id);if(!mod)return;
  const note=S[view].n[id]||'',locked=S[view].l[id];
  panel.innerHTML=`<h3>${mod.icon} ${mod.name}${locked?' 🔒':''}</h3><p class="panel-desc">${mod.desc}</p><textarea id="note-ta" class="${isI?'int-ta':'ext-ta'}" placeholder="Notes...">${note}</textarea><div class="btn-row"><button class="btn btn-save" onclick="saveNote('${id}')">💾 Sauver</button><button class="btn btn-rot" onclick="rotatePlaced('${id}')">↻ Tourner</button><button class="btn btn-lock" onclick="toggleLock('${id}')">${locked?'🔓 Deverrouiller':'🔒 Verrouiller'}</button>${locked?'':`<button class="btn btn-del" onclick="removeModuleConfirm('${id}')">✕ Retirer</button>`}</div><div class="save-ok" id="save-ok"></div>`;
}

window.saveNote=function(id){const ta=document.getElementById('note-ta');if(!ta)return;S[view].n[id]=ta.value;save(view);const ok=document.getElementById('save-ok');if(ok){ok.textContent='Sauvegarde ✓';setTimeout(()=>ok.textContent='',2000);}};
window.toggleLock=function(id){pushH(view);S[view].l[id]=!S[view].l[id];if(!S[view].l[id])delete S[view].l[id];save(view);sel=id;render();renderPanel(id);};
window.rotatePlaced=function(id){
  if(S[view].l[id])return;
  const pos=S[view].p[id];if(!pos)return;
  const newRot=((S[view].r[id]||0)+1)%4;
  const mod=getMods(view).find(m=>m.id===id);if(!mod)return;
  const cs=cells(mod,newRot);const{cols,rows}=GRIDS[view];
  const fits=cs.every(([dc,dr])=>{
    const nr=pos.r+dr,nc=pos.c+dc;
    if(nr<0||nr>=rows||nc<0||nc>=cols)return false;
    for(const[pid,p]of Object.entries(S[view].p)){
      if(pid===id||!p)continue;
      const om=getMods(view).find(m=>m.id===pid);if(!om)continue;
      const oc=cells(om,S[view].r[pid]||0);
      for(const[odc,odr]of oc){if(p.r+odr===nr&&p.c+odc===nc)return false;}
    }
    return true;
  });
  if(fits){pushH(view);S[view].r[id]=newRot;save(view);render();renderPanel(id);}
  else{const ok=document.getElementById('save-ok');if(ok){ok.style.color='#e24b4a';ok.textContent='Pas de place ici';setTimeout(()=>{ok.textContent='';ok.style.color='var(--green)';},2000);}}
};
window.removeModuleConfirm=function(id){
  showConfirm('Retirer ce module ?',()=>{
    pushH(view);
    remove(fbRef(db,`w/${view==='interior'?'int':'ext'}/p/${id}`)).catch(()=>{});
    delete S[view].p[id];sel=null;render();renderPanel(null);
  });
};
window.confirmReset=function(){
  showConfirm('Vider toute la grille ?',()=>{
    pushH(view);S[view].p={};S[view].l={};
    set(fbRefs[view].p,{});set(fbRefs[view].l,{});
    sel=null;render();renderPanel(null);
  });
};
window.exportLayout=function(){
  const data={
    interior:{p:S.interior.p,r:S.interior.r,l:S.interior.l,customs:S.interior.c},
    exterior:{p:S.exterior.p,r:S.exterior.r,l:S.exterior.l,customs:S.exterior.c}
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='wisteria_layout.json';a.click();
};
window.importLayout=function(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      ['interior','exterior'].forEach(v=>{
        if(data[v]){
          if(data[v].p)S[v].p=data[v].p;
          if(data[v].r)S[v].r=data[v].r;
          if(data[v].l)S[v].l=data[v].l;
          if(data[v].customs&&Array.isArray(data[v].customs))S[v].c=data[v].customs;
          save(v);
        }
      });
      render();renderPanel(null);
    }catch(err){alert('Fichier invalide.');}
  };
  reader.readAsText(file);e.target.value='';
};

function renderNotes(){
  const listEl=document.getElementById('notes-list');
  const editorEl=document.getElementById('note-editor');
  if(!listEl||!editorEl)return;
  listEl.innerHTML='<h3>Notes</h3>';
  Object.entries(sharedNotes).forEach(([nid,note])=>{
    const item=document.createElement('div');
    item.className='note-item'+(nid===curNoteId?' active':'');
    item.innerHTML=`<span>${note.title||'Sans titre'}</span><span class="note-del" data-id="${nid}">✕</span>`;
    item.addEventListener('click',e=>{if(e.target.classList.contains('note-del'))return;curNoteId=nid;renderNotes();});
    item.querySelector('.note-del').addEventListener('click',e=>{
      e.stopPropagation();
      showConfirm('Supprimer cette note ?',()=>{delete sharedNotes[nid];if(curNoteId===nid)curNoteId=null;saveNotes();renderNotes();});
    });
    listEl.appendChild(item);
  });
  const addBtn=document.createElement('button');addBtn.className='add-note-btn';addBtn.textContent='+ Nouvelle note';
  addBtn.addEventListener('click',()=>{const nid='note_'+Date.now();sharedNotes[nid]={title:'Nouvelle note',content:''};curNoteId=nid;saveNotes();renderNotes();});
  listEl.appendChild(addBtn);
  if(curNoteId&&sharedNotes[curNoteId]){
    const note=sharedNotes[curNoteId];
    editorEl.innerHTML=`<input class="note-title-input" id="note-title" value="${note.title||''}" placeholder="Titre"><textarea class="note-content" id="note-content" placeholder="Contenu...">${note.content||''}</textarea><button class="note-save-btn" onclick="saveCurrentNote()">💾 Sauvegarder</button>`;
  } else {
    editorEl.innerHTML='<div class="note-empty">Selectionnez ou creez une note.</div>';
  }
}
window.saveCurrentNote=function(){
  if(!curNoteId)return;
  const t=document.getElementById('note-title')?.value||'Sans titre';
  const c=document.getElementById('note-content')?.value||'';
  sharedNotes[curNoteId]={title:t,content:c};saveNotes();renderNotes();
};

function buildEmojiCats(){
  const ce=document.getElementById('emoji-cats'),ge=document.getElementById('emoji-grid');
  if(!ce||!ge)return;
  ce.innerHTML='';
  const cats=Object.keys(EMOJIS);let ac=cats[0];
  function showCat(cat){
    ac=cat;
    ce.querySelectorAll('.emoji-cat-btn').forEach(b=>b.classList.toggle('active',b.dataset.cat===cat));
    ge.innerHTML='';
    EMOJIS[cat].forEach(em=>{
      const sp=document.createElement('div');sp.className='emoji-pick'+(selEmoji===em?' sel':'');sp.textContent=em;
      sp.addEventListener('click',()=>{selEmoji=em;document.getElementById('f-icon').value=em;ge.querySelectorAll('.emoji-pick').forEach(s=>s.classList.remove('sel'));sp.classList.add('sel');});
      ge.appendChild(sp);
    });
  }
  cats.forEach(cat=>{
    const btn=document.createElement('button');btn.className='emoji-cat-btn'+(cat===ac?' active':'');btn.textContent=cat;btn.dataset.cat=cat;
    btn.addEventListener('click',()=>showCat(cat));ce.appendChild(btn);
  });
  showCat(ac);
}

function buildShapeGrid(){
  const sg=document.getElementById('shape-grid');if(!sg)return;sg.innerHTML='';
  for(let r=0;r<3;r++)for(let c=0;c<4;c++){
    const key=`${c},${r}`;
    const ce=document.createElement('div');ce.className='shape-cell'+(shapeSelected.has(key)?' active':'');
    ce.addEventListener('click',()=>{if(shapeSelected.has(key))shapeSelected.delete(key);else if(shapeSelected.size<6)shapeSelected.add(key);buildShapeGrid();document.getElementById('shape-info').textContent=`${shapeSelected.size} case${shapeSelected.size>1?'s':''}`;});
    sg.appendChild(ce);
  }
}

window.openAddModal=function(){
  editId=null;shapeSelected=new Set(['0,0']);selEmoji='📦';
  document.getElementById('modal-title').textContent='Nouveau module';
  document.getElementById('f-name').value='';document.getElementById('f-icon').value='📦';
  document.getElementById('f-color').value='#7f77dd';
  document.getElementById('f-view').value=view==='notes'?'interior':view;
  document.getElementById('f-desc').value='';document.getElementById('del-mod-btn').style.display='none';
  buildEmojiCats();buildShapeGrid();document.getElementById('shape-info').textContent='1 case';
  document.getElementById('modal').style.display='flex';
};
function openEditModal(id){
  const v=view==='notes'?'interior':view;
  const mod=getMods(v).find(m=>m.id===id);if(!mod)return;
  editId=id;selEmoji=mod.icon;shapeSelected=new Set(mod.cells.map(([x,y])=>`${x},${y}`));
  document.getElementById('modal-title').textContent='Modifier';document.getElementById('f-name').value=mod.name;
  document.getElementById('f-icon').value=mod.icon;document.getElementById('f-color').value=mod.color;
  document.getElementById('f-view').value=v;document.getElementById('f-desc').value=mod.desc;
  document.getElementById('del-mod-btn').style.display=mod.id.startsWith('custom_')?'block':'none';
  buildEmojiCats();buildShapeGrid();document.getElementById('shape-info').textContent=`${shapeSelected.size} case${shapeSelected.size>1?'s':''}`;
  document.getElementById('modal').style.display='flex';
}
window.saveModule=function(){
  const name=document.getElementById('f-name').value.trim();
  const icon=document.getElementById('f-icon').value.trim()||selEmoji||'📦';
  const color=document.getElementById('f-color').value;
  const tv=document.getElementById('f-view').value;
  const desc=document.getElementById('f-desc').value.trim();
  if(!name||shapeSelected.size===0)return;
  const ca=[...shapeSelected].map(k=>k.split(',').map(Number));
  const minX=Math.min(...ca.map(c=>c[0])),minY=Math.min(...ca.map(c=>c[1]));
  const nc=ca.map(([x,y])=>[x-minX,y-minY]);
  if(editId&&editId.startsWith('custom_')){
    const idx=S[tv].c.findIndex(m=>m.id===editId);if(idx>=0)S[tv].c[idx]={...S[tv].c[idx],name,icon,color,desc,cells:nc};
  }else{S[tv].c.push({id:'custom_'+Date.now(),name,icon,color,desc,cells:nc});}
  // Sauvegarde immédiate des customs (pas de délai)
  const co={};S[tv].c.forEach(m=>co[m.id]=m);
  set(fbRefs[tv].c,co).catch(()=>{});
  save(tv);closeModal();if(tv===view)render();
};
window.deleteModule=function(){
  if(!editId||!editId.startsWith('custom_'))return;
  const v=view==='notes'?'interior':view;
  S[v].c=S[v].c.filter(m=>m.id!==editId);delete S[v].p[editId];if(sel===editId)sel=null;
  save(v);closeModal();if(v===view){render();renderPanel(null);}
};
window.closeModal=function(){document.getElementById('modal').style.display='none';};

let confirmCb=null;
function showConfirm(msg,cb){
  confirmCb=cb;
  document.getElementById('confirm-msg').textContent=msg;
  document.getElementById('confirm').style.display='flex';
}
window.closeConfirm=function(){
  document.getElementById('confirm').style.display='none';
  confirmCb=null;
};
document.getElementById('confirm-ok').addEventListener('click',()=>{
  const cb=confirmCb;
  document.getElementById('confirm').style.display='none';
  confirmCb=null;
  if(cb)cb();
});
document.getElementById('confirm-cancel').addEventListener('click',()=>{
  document.getElementById('confirm').style.display='none';
  confirmCb=null;
});
document.addEventListener('dragover',e=>e.preventDefault());
switchView('exterior');

</script>
</body>
</html>
