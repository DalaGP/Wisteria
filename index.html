<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Wisteria — Caravane des Mogs</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1a2e;
  --surface:#16213e;
  --surface2:#0f3460;
  --border:#2a2a4a;
  --border2:#3a3a6a;
  --text:#e8e8f0;
  --text2:#9999bb;
  --text3:#5555aa;
  --accent:#7f77dd;
  --accent2:#534ab7;
  --green:#1d9e75;
  --green2:#0f6e56;
  --radius:8px;
  --cell:54px;
  --gap:3px;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
h1{font-size:20px;font-weight:600;color:var(--accent);letter-spacing:0.5px}
.subtitle{font-size:12px;color:var(--text2);margin-top:2px}
header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
.header-left{display:flex;flex-direction:column}
.header-right{display:flex;align-items:center;gap:8px}
.sync-status{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:5px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.sync-dot.syncing{background:#ef9f27;animation:pulse 1s infinite}
.sync-dot.error{background:#e24b4a}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.tabs{display:flex;gap:6px;padding:14px 20px 0}
.tab{padding:7px 18px;border:1px solid var(--border2);border-bottom:none;border-radius:var(--radius) var(--radius) 0 0;cursor:pointer;font-size:13px;color:var(--text2);background:var(--surface);transition:all 0.15s}
.tab:hover{color:var(--text);background:var(--surface2)}
.tab.active{background:var(--surface2);color:var(--accent);border-color:var(--accent2)}
.layout{display:grid;grid-template-columns:1fr 270px;gap:0;height:calc(100vh - 110px)}
.grid-area{padding:16px 20px;background:var(--surface2);border-top:1px solid var(--border2);overflow:auto}
.grid-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.grid{display:inline-grid;gap:var(--gap);position:relative;user-select:none}
.cell{width:var(--cell);height:var(--cell);border:1px solid var(--border);border-radius:4px;background:var(--bg);transition:background 0.1s,border-color 0.1s}
.cell.hl{background:#1d9e7533;border-color:var(--green)}
.cell.bl{background:#e24b4a22;border-color:#e24b4a77}
.module{position:absolute;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:grab;border:1.5px solid transparent;gap:3px;transition:opacity 0.12s}
.module:hover{opacity:0.88}
.module.dragging{opacity:0.4;cursor:grabbing}
.module.sel{border-color:var(--accent)!important;box-shadow:0 0 0 2px #7f77dd44}
.m-icon{font-size:22px;line-height:1}
.m-name{font-size:9px;font-weight:600;text-align:center;line-height:1.2;padding:0 3px;text-shadow:0 1px 2px rgba(0,0,0,0.6)}
.sidebar{background:var(--surface);border-left:1px solid var(--border2);border-top:1px solid var(--border2);display:flex;flex-direction:column;overflow:hidden}
.sb-section{padding:14px;border-bottom:1px solid var(--border)}
.sb-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.palette{display:flex;flex-direction:column;gap:5px;max-height:320px;overflow-y:auto}
.palette::-webkit-scrollbar{width:4px}
.palette::-webkit-scrollbar-track{background:transparent}
.palette::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.pitem{display:flex;align-items:center;gap:8px;padding:6px 8px;border:1px solid var(--border);border-radius:var(--radius);cursor:grab;background:var(--bg);transition:all 0.12s}
.pitem:hover:not(.placed){background:var(--surface2);border-color:var(--border2)}
.pitem.placed{opacity:0.4;cursor:default}
.p-icon{width:30px;height:30px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.p-info{flex:1;min-width:0}
.p-name{font-size:12px;font-weight:500;color:var(--text)}
.p-size{font-size:10px;color:var(--text2)}
.rot-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border2);border-radius:5px;cursor:pointer;background:var(--surface2);color:var(--text2);font-size:14px;flex-shrink:0;transition:all 0.1s}
.rot-btn:hover{background:var(--surface);color:var(--accent);border-color:var(--accent2)}
.panel{flex:1;padding:14px;overflow-y:auto}
.panel-empty{font-size:12px;color:var(--text3);font-style:italic;margin-top:4px}
.panel h3{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px;display:flex;align-items:center;gap:6px}
.panel-desc{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:10px}
.panel textarea{width:100%;min-height:90px;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius);padding:8px;color:var(--text);font-size:12px;font-family:inherit;resize:vertical;transition:border-color 0.15s}
.panel textarea:focus{outline:none;border-color:var(--accent2)}
.btn-row{display:flex;gap:6px;margin-top:8px}
.btn{padding:5px 12px;font-size:11px;border-radius:var(--radius);cursor:pointer;transition:all 0.12s;border:1px solid}
.btn-save{background:var(--green2);border-color:var(--green);color:#fff}
.btn-save:hover{background:var(--green)}
.btn-del{background:transparent;border-color:#a32d2d;color:#e24b4a}
.btn-del:hover{background:#a32d2d22}
.save-ok{font-size:10px;color:var(--green);margin-top:5px;min-height:14px}
</style>
</head>
<body>
<header>
  <div class="header-left">
    <h1>La Wisteria</h1>
    <div class="subtitle">Caravane des Mogs — Agencement des modules</div>
  </div>
  <div class="header-right">
    <div class="sync-status">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-label">Chargement…</span>
    </div>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchView('interior')">Intérieur</button>
  <button class="tab" onclick="switchView('exterior')">Extérieur</button>
</div>

<div class="layout">
  <div class="grid-area">
    <div class="grid-title" id="grid-title">Intérieur — 9 × 5</div>
    <div class="grid" id="grid"></div>
  </div>
  <div class="sidebar">
    <div class="sb-section">
      <div class="sb-title">Modules</div>
      <div class="palette" id="palette"></div>
    </div>
    <div class="panel" id="panel">
      <div class="panel-empty">Cliquez sur un module placé pour voir ses détails.</div>
    </div>
  </div>
</div>

<script>
const DEFS = {
  interior:[
    {id:'cosy',    name:'Coin cosy',           icon:'🛋️', color:'#7f77dd', cells:[[0,0],[1,0],[2,0],[1,1]], desc:'Espace de repos. Coussins, couvertures, cheminée — pour se retrouver après la route.'},
    {id:'atelier', name:'Atelier',              icon:'🧵', color:'#1d9e75', cells:[[0,0],[1,0],[2,0],[0,1],[1,1],[2,1]], desc:'Couture, décoration, petites réparations. Tout ce qu\'il faut pour garder la Wisteria belle.'},
    {id:'biblio',  name:'Bibliothèque',         icon:'📚', color:'#d85a30', cells:[[0,0],[1,0],[0,1],[1,1]], desc:'Archives, cartes, parchemins. Le cœur intellectuel de la caravane.'},
    {id:'cuisine', name:'Cuisine',              icon:'🍲', color:'#d4537e', cells:[[0,0],[1,0],[0,1],[1,1]], desc:'Fourneaux, épices, odeurs du monde. On y mange bien.'},
    {id:'reserve', name:'Réserve',              icon:'📦', color:'#888780', cells:[[0,0],[1,0],[2,0]], desc:'Provisions, tissus, objets divers. Ce qu\'on a accumulé sur la route.'},
    {id:'forge',   name:'Forge & Alambic',      icon:'⚗️', color:'#ba7517', cells:[[0,0],[1,0],[2,0],[0,1],[2,1]], desc:'Forge rudimentaire et alambic. Pour créer, distiller, expérimenter.'},
    {id:'portrait',name:'Portrait d\'Alphinaud',icon:'🖼️', color:'#5f5e5a', cells:[[0,0]], desc:'Un portrait encadré d\'Alphinaud Leveilleur. Personne ne sait exactement pourquoi il est là.'},
    {id:'tonneau', name:'Tonneau',              icon:'🍺', color:'#3b6d11', cells:[[0,0]], desc:'Le tonneau du Chant de la Mer. Contenu variable selon les ports visités.'},
  ],
  exterior:[
    {id:'jard1',   name:'Jardinière A',         icon:'🌿', color:'#1d9e75', cells:[[0,0],[1,0]], desc:'Plaque de jardinière. Herbes aromatiques et plantes médicinales.'},
    {id:'jard2',   name:'Jardinière B',         icon:'🌸', color:'#1d9e75', cells:[[0,0],[1,0]], desc:'Plaque de jardinière. Fleurs colorées, vie et couleur sur la route.'},
    {id:'jard3',   name:'Jardinière C',         icon:'🌱', color:'#1d9e75', cells:[[0,0],[1,0]], desc:'Plaque de jardinière. Jeunes pousses et plantes rares collectées en chemin.'},
    {id:'reserv',  name:'Réservoir',            icon:'💧', color:'#378add', cells:[[0,0],[1,0],[0,1],[1,1]], desc:'Réservoir d\'eau. Irrigation des jardinières et réserve pour la route.'},
    {id:'ruche',   name:'Ruche',                icon:'🐝', color:'#ef9f27', cells:[[0,0],[1,0],[0,1],[1,1]], desc:'Ruche installée au-dessus d\'une fenêtre. Miel, cire, et bourdonnement apaisant.'},
    {id:'drapeau', name:'Drapeau',              icon:'🚩', color:'#534ab7', cells:[[0,0]], desc:'Le drapeau de la Wisteria. Moguri et miel — les couleurs de la caravane.'},
    {id:'lanterne',name:'Lanterne',             icon:'🏮', color:'#d85a30', cells:[[0,0]], desc:'Lanterne sylphe. Éclaire la route de nuit.'},
    {id:'plante',  name:'Plante grimpante',     icon:'🌺', color:'#d4537e', cells:[[0,0],[0,1],[0,2]], desc:'Plante grimpante aux fleurs bleues. Elle envahit progressivement la façade.'},
    {id:'mojito',  name:'Pied de Mojito',       icon:'🍃', color:'#639922', cells:[[0,0],[1,0]], desc:'Un pied de menthe destiné aux mojitos. Très apprécié lors des escales estivales.'},
    {id:'cheminee',name:'Cheminée',             icon:'🏠', color:'#888780', cells:[[0,0]], desc:'Cheminée arrière. La fumée indique que quelqu\'un prépare quelque chose.'},
  ]
};

const GRIDS={interior:{cols:9,rows:5},exterior:{cols:10,rows:6}};
let view='interior';
let placements={interior:{},exterior:{}};
let notes={interior:{},exterior:{}};
let rotations={};
let sel=null;
let drag=null;
let saveTimer=null;

function cells(mod,rot){
  let c=mod.cells.map(x=>[...x]);
  const r=(rot||0)%4;
  for(let i=0;i<r;i++){
    c=c.map(([x,y])=>[-y,x]);
    const mx=Math.min(...c.map(v=>v[0]));
    const my=Math.min(...c.map(v=>v[1]));
    c=c.map(([x,y])=>[x-mx,y-my]);
  }
  return c;
}

function canPlace(id,r,c,rot){
  const {cols,rows}=GRIDS[view];
  const mod=DEFS[view].find(m=>m.id===id);
  if(!mod)return false;
  const cs=cells(mod,rot);
  const pl=placements[view];
  for(const[dc,dr]of cs){
    const nr=r+dr,nc=c+dc;
    if(nr<0||nr>=rows||nc<0||nc>=cols)return false;
    for(const[pid,pos]of Object.entries(pl)){
      if(pid===id)continue;
      const om=DEFS[view].find(m=>m.id===pid);
      if(!om)continue;
      const oc=cells(om,rotations[view+'_'+pid]||0);
      for(const[odc,odr]of oc){
        if(pos.r+odr===nr&&pos.c+odc===nc)return false;
      }
    }
  }
  return true;
}

function switchView(v){
  view=v;
  sel=null;
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',(i===0&&v==='interior')||(i===1&&v==='exterior'));
  });
  const {cols,rows}=GRIDS[v];
  document.getElementById('grid-title').textContent=
    v==='interior'?`Intérieur — ${cols} × ${rows}`:`Extérieur — ${cols} × ${rows}`;
  render();
  renderPanel(null);
}

function render(){
  const {cols,rows}=GRIDS[view];
  const CELL=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell'))||54;
  const GAP=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--gap'))||3;
  const grid=document.getElementById('grid');
  grid.style.gridTemplateColumns=`repeat(${cols},${CELL}px)`;
  grid.style.width=`${cols*(CELL+GAP)-GAP}px`;
  grid.style.height=`${rows*(CELL+GAP)-GAP}px`;
  grid.innerHTML='';
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const el=document.createElement('div');
    el.className='cell';
    el.dataset.r=r;el.dataset.c=c;
    el.addEventListener('dragover',onOver);
    el.addEventListener('drop',onDrop);
    el.addEventListener('dragleave',clearHL);
    grid.appendChild(el);
  }
  const pl=placements[view];
  Object.entries(pl).forEach(([pid,pos])=>{
    const mod=DEFS[view].find(m=>m.id===pid);
    if(!mod)return;
    const rot=rotations[view+'_'+pid]||0;
    const cs=cells(mod,rot);
    const maxC=Math.max(...cs.map(c=>c[0]));
    const maxR=Math.max(...cs.map(c=>c[1]));
    const el=document.createElement('div');
    el.className='module'+(pid===sel?' sel':'');
    el.style.cssText=`background:${mod.color}28;left:${pos.c*(CELL+GAP)}px;top:${pos.r*(CELL+GAP)}px;width:${(maxC+1)*(CELL+GAP)-GAP}px;height:${(maxR+1)*(CELL+GAP)-GAP}px;border-color:${mod.color}66`;
    el.innerHTML=`<div class="m-icon">${mod.icon}</div><div class="m-name" style="color:${mod.color}">${mod.name}</div>`;
    el.draggable=true;
    el.addEventListener('click',e=>{e.stopPropagation();sel=pid;render();renderPanel(pid);});
    el.addEventListener('dragstart',e=>{drag={id:pid};el.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    el.addEventListener('dragend',()=>el.classList.remove('dragging'));
    grid.appendChild(el);
    cs.forEach(([dc,dr])=>{
      const idx=(pos.r+dr)*cols+(pos.c+dc);
      const cellEl=grid.children[idx];
      if(cellEl){cellEl.style.background=mod.color+'18';cellEl.style.borderColor=mod.color+'44';}
    });
  });
  grid.addEventListener('click',()=>{sel=null;render();renderPanel(null);});

  const pal=document.getElementById('palette');
  pal.innerHTML='';
  DEFS[view].forEach(mod=>{
    const placed=!!pl[mod.id];
    const item=document.createElement('div');
    item.className='pitem'+(placed?' placed':'');
    item.draggable=!placed;
    if(!placed){
      item.addEventListener('dragstart',e=>{drag={id:mod.id};e.dataTransfer.effectAllowed='move';});
    }
    const rot=rotations[view+'_'+mod.id]||0;
    const cs=cells(mod,rot);
    const w=Math.max(...cs.map(c=>c[0]))+1;
    const h=Math.max(...cs.map(c=>c[1]))+1;
    item.innerHTML=`
      <div class="p-icon" style="background:${mod.color}28">${mod.icon}</div>
      <div class="p-info">
        <div class="p-name">${mod.name}${placed?' ✓':''}</div>
        <div class="p-size">${w}×${h} (${cs.length} case${cs.length>1?'s':''})</div>
      </div>
      <div class="rot-btn" title="Pivoter" data-id="${mod.id}">↻</div>
    `;
    item.querySelector('.rot-btn').addEventListener('click',e=>{
      e.stopPropagation();
      const key=view+'_'+mod.id;
      rotations[key]=((rotations[key]||0)+1)%4;
      scheduleSave();
      render();
    });
    pal.appendChild(item);
  });
}

function onOver(e){
  e.preventDefault();
  if(!drag)return;
  clearHL();
  const r=+e.currentTarget.dataset.r,c=+e.currentTarget.dataset.c;
  const {cols,rows}=GRIDS[view];
  const mod=DEFS[view].find(m=>m.id===drag.id);
  if(!mod)return;
  const rot=rotations[view+'_'+drag.id]||0;
  const cs=cells(mod,rot);
  const ok=canPlace(drag.id,r,c,rot);
  const grid=document.getElementById('grid');
  cs.forEach(([dc,dr])=>{
    const nr=r+dr,nc=c+dc;
    if(nr>=0&&nr<rows&&nc>=0&&nc<cols){
      const el=grid.children[nr*cols+nc];
      if(el)el.classList.add(ok?'hl':'bl');
    }
  });
}

function onDrop(e){
  e.preventDefault();
  clearHL();
  if(!drag)return;
  const r=+e.currentTarget.dataset.r,c=+e.currentTarget.dataset.c;
  const rot=rotations[view+'_'+drag.id]||0;
  if(canPlace(drag.id,r,c,rot)){
    placements[view][drag.id]={r,c};
    scheduleSave();
    render();
    if(drag.id===sel)renderPanel(drag.id);
  }
  drag=null;
}

function clearHL(){
  document.querySelectorAll('.cell.hl,.cell.bl').forEach(el=>el.classList.remove('hl','bl'));
}

function renderPanel(id){
  const panel=document.getElementById('panel');
  if(!id){
    panel.innerHTML='<div class="panel-empty">Cliquez sur un module placé pour voir ses détails.</div>';
    return;
  }
  const mod=DEFS[view].find(m=>m.id===id);
  if(!mod)return;
  const note=notes[view][id]||'';
  panel.innerHTML=`
    <h3>${mod.icon} ${mod.name}</h3>
    <p class="panel-desc">${mod.desc}</p>
    <textarea id="note-ta" placeholder="Notes de session…">${note}</textarea>
    <div class="btn-row">
      <button class="btn btn-save" onclick="saveNote('${id}')">Sauvegarder</button>
      <button class="btn btn-del" onclick="removeModule('${id}')">Retirer</button>
    </div>
    <div class="save-ok" id="save-ok"></div>
  `;
}

function saveNote(id){
  const ta=document.getElementById('note-ta');
  if(!ta)return;
  notes[view][id]=ta.value;
  scheduleSave();
  const ok=document.getElementById('save-ok');
  if(ok){ok.textContent='Sauvegardé ✓';setTimeout(()=>ok.textContent='',2000);}
}

function removeModule(id){
  delete placements[view][id];
  sel=null;
  scheduleSave();
  render();
  renderPanel(null);
}

function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(persistState,600);
}

function setSyncStatus(s){
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-label');
  dot.className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');
  lbl.textContent=s==='ok'?'Synchronisé':s==='syncing'?'Enregistrement…':s==='error'?'Erreur de sync':'Chargement…';
}

function persistState(){
  setSyncStatus('syncing');
  const data=JSON.stringify({placements,notes,rotations});
  localStorage.setItem('wisteria_v1',data);
  setTimeout(()=>setSyncStatus('ok'),400);
}

function loadState(){
  setSyncStatus('loading');
  try{
    const raw=localStorage.getItem('wisteria_v1');
    if(raw){
      const data=JSON.parse(raw);
      if(data.placements)placements=data.placements;
      if(data.notes)notes=data.notes;
      if(data.rotations)rotations=data.rotations;
    }
    setSyncStatus('ok');
  }catch(e){setSyncStatus('error');}
  render();
  renderPanel(null);
}

document.addEventListener('dragover',e=>e.preventDefault());
loadState();
</script>
</body>
</html>
